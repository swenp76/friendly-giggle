        { title: "Phasen des motorischen Lernens", content: `**3 Phasen nach Meinel/Schnabel**

**Phase 1: Grobkoordination (Aneignungsphase)**
- Erste ungenaue Bewegungsausführung
- Viele Fehler, hohe Konzentration nötig
- Hohe Aktivierung vieler Muskeln (Koaktivierung)
- Trainer: Demonstration + einfache Erklärung, Erfolgserlebnisse schaffen

**Phase 2: Feinkoordination (Verfestigungsphase)**
- Bewegung wird flüssiger und präziser
- Weniger Fehler, aber noch nicht stabil unter Druck
- Beginn der Automatisierung
- Trainer: Korrektives Feedback, Variationen einführen

**Phase 3: Stabilisierung & Automatisierung**
- Bewegung läuft automatisch ab
- Wenig Konzentration nötig → freie Kapazität für Taktik
- Stabil auch unter Wettkampfdruck
- Trainer: Drucksituationen simulieren, wettkampfnahe Bedingungen

        { title: "Lernmethoden & Feedback", content: `**Übungsformen im Baseball**
- **Drill:** Isolierte Wiederholung einer Teilbewegung (z.B. nur Arm-Action beim Pitching)
- **Whole-Part-Whole:** Gesamtbewegung → Teilbewegung üben → wieder Gesamtbewegung
- **Variable Übung:** Verschiedene Variationen (Fastball/Changeup/Curveball)

**Geschlossene vs. Offene Übungen**
- Geschlossen: Gleichbleibende Bedingungen (Tee-Batting, Pitching Mechanics isoliert)
- Offen: Wechselnde Bedingungen (Live-Pitching, Spielsituationen)

**Feedback-Arten**
- **Intrinsisch:** Eigenes Körpergefühl (propriozeptiv)
- **Extrinsisch/Augmented:**
- KR (Knowledge of Results): Ergebnis-Feedback (Ball hat Strike-Zone verfehlt)
- KP (Knowledge of Performance): Bewegungsqualität (Arm-Aktion zu früh)

**Coaching-Hinweise**

- Fortgeschrittene: KR-Feedback, mehr Selbstreflexion fördern
- Feedback-Häufigkeit reduzieren → selbstständiges Lernen fördern!` },

        { title: "Motivation & Mentales Training", content: `**Motivationsarten**
- **Intrinsisch:** Freude an der Sache selbst → langfristig stabiler; zu fördern!
- **Extrinsisch:** Belohnung, Druck von außen → kann intrinsische untergraben (Korrumpierungseffekt)

**Selbstbestimmungstheorie (Deci & Ryan)**
3 Grundbedürfnisse für intrinsische Motivation:
1. **Kompetenzerleben** (Ich schaffe das!)
2. **Autonomieerleben** (Ich entscheide mit!)
3. **Soziale Eingebundenheit** (Ich gehöre dazu!)

**Mentales Training**
- **Visualisierung:** Bewegung im Kopf „durchführen"
- **Self-Talk:** Positive Affirmationen (besonders für Pitcher wichtig!)
- **Atemtechniken:** Arousal-Kontrolle vor wichtigen Spielzügen

**Flow-Erleben (Csikszentmihalyi)**
Optimale Balance aus Anforderung und Fähigkeit
→ Aufgaben müssen herausfordernd ABER erreichbar sein!

**Yerkes-Dodson-Kurve**
Umgekehrtes U: Zu wenig ODER zu viel Aktivierung → schlechtere Leistung
Optimales Arousal-Niveau ist sportartspezifisch!` },

        { title: "Erste Hilfe im Sport", content: `**Reanimation (CPR)**

        { title: "Ernährung rund ums Training", content: `**Pre-Training (2–3 Stunden vorher)**

        { title: "DBA Relay Plays & Cutoffs", content: `**Grundprinzip**
Outfield → Relay Man → Zielbase

**Cut-Off-Man Positionierung**

- In direkter Linie Ball → Zielbase positionieren

- Single ins LF → 3B als Cut-Off für Home

        { title: "Pitching Mechanik", content: `**6 Phasen der Wurf-Mechanik**
1. Wind-Up: Gewicht auf Pivot-Fuß, Körperdrehung
2. Stride: Schrittbein nach vorne, Hüftöffnung beginnt
3. Arm Cocking (früh): Wurfarm geht zurück und nach oben
4. Arm Cocking (spät): Schulter maximal außenrotiert – GRÖSSTE BELASTUNG!
5. Acceleration: Beschleunigung zum Releasing Point
6. Deceleration / Follow-Through: KRITISCH für Verletzungsprävention!

**Häufige Fehler**
- Zu frühe Hüftöffnung → Kontrollverlust + erhöhte Schulterbelastung
- Fehlende Follow-Through → UCL-Risiko am Ellenbogen
- „Elbow drop" (Ellenbogen unter Schulterniveau) → Überbelastung

**Pitch Count (Empfehlungen für Junioren)**
- U11: max 85 Pitches/Spiel
- U13: max 95 Pitches/Spiel
- U15: max 95 Pitches/Spiel
- U17: max 105 Pitches/Spiel
→ Pflichtruhetage je nach Anzahl Pitches einhalten!

**Grundpitches**
- Fastball (4-seam Kontrolle, 2-seam Bewegung)
- Changeup (Geschwindigkeitsdifferenz, gleiche Mechanik!)
- Curveball: ERST ab 15 Jahren empfohlen (Wachstumsfugen!)` },

        { title: "Batting Grundlagen", content: `**Stance (Ausgangsposition)**
- Schulterbreiter Stand, leicht gebeugte Knie
- Gewicht leicht auf hinterem Fuß (60/40)
- Hände hinter hinterer Schulter, Bat-Winkel ca. 45°
- Entspannte Schultern, Kopf zur Pitchingzone gerichtet

**Load & Stride**
- Load: Gewichtsverlagerung nach hinten (Timing aufbauen)
- Stride: Kleiner Schritt nach vorne (15–20 cm), leicht und kontrolliert
- Stride vor Pitch-Entscheidung → Commitment danach!

**Hip Rotation**
- Hüfte dreht ZUERST, dann Schultern, dann Arme
- „Hüfte führt, Bat folgt"

**Contact Zone nach Pitchlage**
- Pull-Pitch (innen): Früher Kontakt, vorne
- Middle-Pitch: Kontakt über der Platte
- Oppo-Pitch (außen): Später Kontakt, hinten

**Trainingsaufbau für Anfänger**
1. Tee-Work (Repetierbewegung, keine Variablen)
2. Soft-Toss (leichte Timing-Variante)
3. Front-Toss (reale Distanz, niedrige Geschwindigkeit)
4. Live-Pitching (vollständige Spielbedingungen)` },

// State
let currentView = 'home';
let currentModule = null;
let currentTopic = null;
let fcCards = [...DATA.flashcards];
let fcIndex = 0;
let fcRevealed = false;

// Navigation
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  currentView = id;
  window.scrollTo(0, 0);

  const back = document.getElementById('nav-back');
  const title = document.getElementById('nav-title');

  if (id === 'home') {
    back.style.display = 'none';
    title.textContent = '⚾ Trainer C Lizenz';
  } else if (id === 'module') {
    back.style.display = 'inline-block';
    title.textContent = currentModule.emoji + ' ' + currentModule.name;
  } else if (id === 'topic') {
    back.style.display = 'inline-block';
    title.textContent = currentTopic.title;
  } else if (id === 'flashcards') {
    back.style.display = 'inline-block';
    title.textContent = '🃏 Karteikarten';
  }
}

function goBack() {
  if (currentView === 'topic') showView('module');
  else showView('home');
}

// Render modules grid
function renderHome() {
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = DATA.modules.map(m => `
    <button class="module-card" onclick="openModule('${m.id}')" style="border-color:${m.color}20">
      <div class="emoji">${m.emoji}</div>
      <div class="mod-name" style="color:${m.color}">${m.name}</div>
      <div class="mod-count">${m.topics.length} Themen</div>
    </button>
  `).join('');
}

function openModule(id) {
  currentModule = DATA.modules.find(m => m.id === id);
  const header = document.getElementById('module-header');
  header.style.background = currentModule.bg;
  header.style.borderLeft = '5px solid ' + currentModule.color;
  document.getElementById('module-title').textContent = currentModule.emoji + ' ' + currentModule.name;
  document.getElementById('module-desc').textContent = currentModule.topics.length + ' Lernthemen';

  const list = document.getElementById('topic-list');
  list.innerHTML = currentModule.topics.map((t, i) => `
    <button class="topic-btn" onclick="openTopic(${i})" 
      onmouseover="this.style.borderColor='${currentModule.color}'"
      onmouseout="this.style.borderColor='#e5e1d8'">
      ${t.title}
      <span>→</span>
    </button>
  `).join('');
  showView('module');
}

function openTopic(i) {
  currentTopic = currentModule.topics[i];
  document.getElementById('topic-title').textContent = currentTopic.title;
  document.getElementById('topic-content').innerHTML = renderContent(currentTopic.content, currentModule.color);
  showView('topic');
}

function renderContent(text, color) {
  const blocks = text.split('\n\n');
  return blocks.map(block => {
    const lines = block.split('\n');
    let html = '<div class="content-block">';
    lines.forEach(line => {
      if (!line.trim()) return;
      const formatted = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      if (line.startsWith('**') && line.endsWith('**') && (line.match(/\*\*/g)||[]).length === 2) {
        html += `<div class="content-h3" style="color:${color}">${line.slice(2,-2)}</div>`;
      } else if (line.startsWith('- ')) {
        html += `<div class="content-li"><span class="content-li-dot" style="color:${color}">•</span><span class="content-li-text">${formatted.slice(2)}</span></div>`;
      } else {
        html += `<p class="content-p">${formatted}</p>`;
      }
    });
    html += '</div>';
    return html;
  }).join('');
}

// Flashcards
function startFlashcards() {
  shuffleCards();
  showView('flashcards');
}

function shuffleCards() {
  fcCards = [...DATA.flashcards].sort(() => Math.random() - 0.5);
  fcIndex = 0;
  fcRevealed = false;
  updateCard();
}

function updateCard() {
  const card = fcCards[fcIndex];
  const el = document.getElementById('fc-card');
  const label = document.getElementById('fc-label');
  const text = document.getElementById('fc-text');
  const hint = document.getElementById('fc-hint');
  const counter = document.getElementById('fc-counter');
  const progress = document.getElementById('fc-progress');

  el.classList.toggle('revealed', fcRevealed);
  label.textContent = fcRevealed ? 'Antwort' : 'Frage';
  text.textContent = fcRevealed ? card.a : card.q;
  text.className = 'fc-text ' + (fcRevealed ? 'answer' : 'question');
  hint.textContent = fcRevealed ? 'Tippen um Frage zu sehen' : 'Tippen um Antwort zu sehen';
  counter.textContent = (fcIndex + 1) + ' / ' + fcCards.length;
  progress.style.width = ((fcIndex + 1) / fcCards.length * 100) + '%';
}

function toggleAnswer() {
  fcRevealed = !fcRevealed;
  updateCard();
}

function fcNav(dir) {
  fcIndex = (fcIndex + dir + fcCards.length) % fcCards.length;
  fcRevealed = false;
  updateCard();
}

// Init
renderHome();
</script>
